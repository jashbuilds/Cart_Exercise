<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../Cart-Exercise.css">
    <link rel="stylesheet" href="../style.css">

    <title>Cart Exercise</title>
</head>

<body class="cart-container">

    <nav class="navbar navbar-expand-xxl bg-secondary p-4">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">

            <div class="navigation-logo">
                <a href="#">
                    <img src="../Icons/online-shopping.svg" alt="company-logo" width="36" height="36">
                </a>
            </div>

            <div class="text-center d-none d-md-block d-lg-block">
                <p class="text-white m-0 fs-5">Farm2Home</p>
            </div>

            <div>
                <a href="#" class="position-relative">
                    <img src="../Icons/cart.svg" alt="cart-icon" width="36" height="36"
                        data-bs-target="#exampleModalToggle" data-bs-toggle="modal">
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-success">0</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="main main-content">
        <div class="container pt-5 pb-5">
            <div class="row d-flex gy-5" id="cardsRow">

            </div>
        </div>

        <div class="modal fade" id="exampleModalToggle" aria-hidden="true" aria-labelledby="exampleModalToggleLabel"
            tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true">
            <div class="modal-dialog modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalToggleLabel">Cart</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="fruitCart">

                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-primary" data-bs-target="#exampleModalToggle2" data-bs-toggle="modal"
                            id="orderNowBtn" disabled>Order Now</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="exampleModalToggle2" aria-hidden="true" aria-labelledby="exampleModalToggleLabel2"
            tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-hidden="true">
            <div class="modal-dialog modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalToggleLabel2">Confirm Your Order!</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p class="mt-3">Are you sure you want to proceed with this order?</p>
                    </div>
                    <div class="modal-footer">

                        <button class="btn btn-success" id="confirmOrderBtn">Confirm Order</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../script.js"></script>
</body>

</html>
